events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type text/html;

  # Resolver para DNS
  resolver 8.8.8.8 1.1.1.1 valid=60s;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / { try_files $uri /index.html; }

    # Proxy para bestleague.top
    location /t/ {
      proxy_pass https://bestleague.top/;
      proxy_http_version 1.1;
      proxy_set_header Host bestleague.top;
      proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
      proxy_set_header Accept "*/*";
      proxy_set_header Connection "";
      
      # SSL
      proxy_ssl_server_name on;
      proxy_ssl_protocols TLSv1.2 TLSv1.3;
      proxy_ssl_verify off;
      
      # Buffer
      proxy_buffering off;
      proxy_cache off;
      
      # Sub filter para eliminar bloqueo PC
      sub_filter_once off;
      sub_filter_types text/html;
      sub_filter 'function isWindowsPC()' 'function isWindowsPC(){return true}//';
      sub_filter 'if (!isWindowsPC())' 'if (false)';
      sub_filter 'showUnsupportedDeviceMessage()' 'null//';
      
      add_header Access-Control-Allow-Origin *;
    }
  }
}
