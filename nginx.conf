events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Proxy para IPTV 181 - reescribe URLs en M3U8
  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / { try_files $uri /index.html; }

    # Proxy para 181.224.200.5:2277
    location /p181/ {
      proxy_pass http://181.224.200.5:2277/;
      proxy_http_version 1.1;
      proxy_set_header Host 181.224.200.5:2277;
      proxy_set_header User-Agent "Mozilla/5.0";
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      
      # Rewrite absolute URLs in M3U8 playlists
      sub_filter_once off;
      sub_filter_types application/vnd.apple.mpegurl application/x-mpegurl text/plain;
      sub_filter 'http://181.224.200.5:2277' 'https://$host/p181';
      
      add_header Access-Control-Allow-Origin *;
    }

    # Proxy para 190.108.83.69:8000
    location /p190/ {
      proxy_pass http://190.108.83.69:8000/;
      proxy_http_version 1.1;
      proxy_set_header Host 190.108.83.69:8000;
      proxy_set_header User-Agent "Mozilla/5.0";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      
      sub_filter_once off;
      sub_filter_types application/vnd.apple.mpegurl application/x-mpegurl text/plain;
      sub_filter 'http://190.108.83.69:8000' 'https://$host/p190';
      
      add_header Access-Control-Allow-Origin *;
    }
  }
}
