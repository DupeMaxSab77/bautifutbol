events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type text/html;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / { try_files $uri /index.html; }

    # Proxy para bestleague.top - elimina el bloqueo de PC
    location /t/ {
      proxy_pass https://bestleague.top/;
      proxy_http_version 1.1;
      proxy_set_header Host bestleague.top;
      proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
      proxy_buffering off;
      
      # Remueve el bloqueo de isWindowsPC
      sub_filter_once off;
      sub_filter 'function isWindowsPC()' 'function isWindowsPC(){return true} //';
      sub_filter 'showUnsupportedDeviceMessage()' 'null //';
      sub_filter 'if (!isWindowsPC())' 'if (false)';
      
      add_header Access-Control-Allow-Origin *;
      add_header X-Robots-Tag noindex;
    }
  }
}
