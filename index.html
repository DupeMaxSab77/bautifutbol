<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>StreamHub</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;font-family:Arial,sans-serif;color:#e0e0e0;display:flex;height:100vh}
#side{width:280px;background:#12121a;display:flex;flex-direction:column;border-right:1px solid #2a2a3a;overflow:hidden}
#side h1{color:#00e676;padding:14px;font-size:16px;border-bottom:1px solid #2a2a3a}
#list{flex:1;overflow-y:auto;padding:6px;font-size:12px}
.c{padding:7px 8px;border-radius:4px;cursor:pointer;margin-bottom:1px;display:flex;justify-content:space-between}
.c:hover{background:#1e1e2e}
.c.on{background:#00e67622;border-left:2px solid #00e676}
.t{font-size:8px;padding:1px 4px;border-radius:2px;background:#2a2a3a}
.t1{background:#1a3a2a;color:#00e676}
.t2{background:#3a1a2a;color:#ff6b9d}
#main{flex:1;display:flex;flex-direction:column}
#wrap{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative}
#v{width:100%;height:100%;background:#000}
#inf{padding:8px 14px;background:#12121a;border-top:1px solid #2a2a3a;display:flex;justify-content:space-between;font-size:12px}
#st{color:#888}
#nm{color:#fff}
#ov{position:absolute;z-index:5;color:#555;font-size:24px;pointer-events:none;opacity:.5}
#er{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:#1a0a0a;color:#f55;padding:6px 12px;border-radius:4px;font-size:11px;display:none}
@media(max-width:768px){#side{width:100%;max-height:30vh}body{flex-direction:column}}
</style>
</head>
<body>
<div id="side">
  <h1>StreamHub</h1>
  <div id="list">Cargando...</div>
  <div style="padding:6px 8px;font-size:10px;color:#555;border-top:1px solid #2a2a3a" id="cnt">0</div>
</div>
<div id="main">
  <div id="wrap">
    <video id="v" controls playsinline></video>
    <div id="ov">▶</div>
    <div id="er"></div>
  </div>
  <div id="inf"><span id="nm">Elegí un canal</span><span id="st">hls.js + shaka</span></div>
</div>

<script>
let cc=[],hls=null,au=null;

async function init(){
  try{
    let r=await fetch('channels/channels.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    cc=await r.json();
    document.getElementById('cnt').textContent=cc.length+' canales';
    document.getElementById('list').onclick=e=>{
      let el=e.target.closest('.c');
      if(el)play(el.dataset.url);
    };
    render();
    shaka.polyfill.installAll();
  }catch(e){
    document.getElementById('list').innerHTML='Error: '+e.message;
  }
}

function render(){
  let q=(document.getElementById('list').querySelector('input')||{}).value||'';
  let f=q?cc.filter(c=>c.name.toLowerCase().includes(q)):cc;
  document.getElementById('list').innerHTML=(f.length?f.map(c=>
    `<div class="c ${au===c.url?'on':''}" data-url="${c.url}"><span>${c.name}</span><span class="t ${c.type==='mpd'?'t2':'t1'}">${c.type==='mpd'?'M':'H'}</span></div>`
  ).join(''):'Sin resultados')+
  '<input placeholder="Buscar..." oninput="render()" style="margin-top:6px;width:100%;padding:6px;border-radius:4px;border:1px solid #2a2a3a;background:#1a1a25;color:#fff;font-size:12px;outline:none">';
}

function play(u){
  let ch=cc.find(c=>c.url===u);
  if(!ch)return;
  au=u;render();
  document.getElementById('nm').textContent='▶ '+ch.name;
  document.getElementById('st').textContent='Cargando...';
  document.getElementById('er').style.display='none';
  document.getElementById('ov').style.display='none';
  
  if(hls){hls.destroy();hls=null}
  let v=document.getElementById('v');
  v.pause();v.src='';v.load();
  if(window.sPlayer){try{sPlayer.destroy()}catch(e){}sPlayer=null}
  
  setTimeout(()=>{
    if(document.getElementById('st').textContent==='Cargando...'){
      document.getElementById('st').textContent='❌ Timeout';
      showErr('No responde. Probá otro canal.');
    }
  },20000);
  
  if(ch.type==='mpd') loadMPD(ch,v);
  else loadHLS(ch.url,v);
}

function loadHLS(u,v){
  if(Hls&&Hls.isSupported()){
    hls=new Hls({enableWorker:false});
    hls.loadSource(u);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      v.play().then(()=>{
        document.getElementById('st').textContent='▶ OK';
        document.getElementById('ov').style.display='none';
      }).catch(()=>{
        document.getElementById('st').textContent='⏸ Click para reproduci';
        document.getElementById('ov').textContent='⏸ Click para play';
        document.getElementById('ov').style.display='block';
      });
    });
    hls.on(Hls.Events.ERROR,(_,d)=>{
      if(d.fatal){
        document.getElementById('st').textContent='❌ Error';
        showErr('HLS: '+(d.response?.code||'fallo'));
      }
    });
  }else{
    v.src=u;
    v.play().then(()=>document.getElementById('st').textContent='▶ OK')
     .catch(()=>document.getElementById('st').textContent='⏸ Click');
  }
  
  // Click to play overlay
  document.getElementById('wrap').onclick=()=>v.play();
}

async function loadMPD(ch,v){
  if(!shaka.Player.isBrowserSupported()){
    showErr('MPD no soportado');document.getElementById('st').textContent='❌ Error';return;
  }
  try{
    let p=new shaka.Player();window.sPlayer=p;
    await p.attach(v);
    let cfg={manifest:{dash:{ignoreMinBufferTime:true}}};
    if(ch.keyId&&ch.key) cfg.drm={clearKeys:{[ch.keyId]:ch.key}};
    p.configure(cfg);
    await p.load(ch.url);
    v.play().then(()=>{document.getElementById('st').textContent='▶ OK'})
     .catch(()=>{document.getElementById('st').textContent='⏸ Click'});
    document.getElementById('ov').style.display='none';
    document.getElementById('wrap').onclick=()=>v.play();
  }catch(e){
    document.getElementById('st').textContent='❌ Error';
    showErr('MPD: '+(e.message||e.code||'error'));
  }
}

function showErr(m){
  let e=document.getElementById('er');
  e.textContent=m;e.style.display='block';
  setTimeout(()=>{e.style.display='none'},6000);
}

init();
</script>
</body>
</html>
