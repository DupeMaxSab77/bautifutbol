<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0f;color:#e0e0e0;overflow:hidden}
#app{display:flex;height:100vh}
#side{width:300px;background:#12121a;display:flex;flex-direction:column;border-right:1px solid #2a2a3a;flex-shrink:0}
#side h1{color:#00e676;padding:14px 16px;font-size:17px;border-bottom:1px solid #2a2a3a}
#search{margin:8px;padding:8px 10px;border-radius:6px;border:1px solid #2a2a3a;background:#1a1a25;color:#fff;font-size:13px;outline:none}
#search:focus{border-color:#00e676}
#list{flex:1;overflow-y:auto;padding:4px 8px;font-size:13px}
.ch{padding:8px 10px;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;margin-bottom:1px}
.ch:hover{background:#1e1e2e}
.ch.on{background:#00e67622;border-left:2px solid #00e676}
.tag{font-size:9px;padding:2px 5px;border-radius:3px;background:#2a2a3a}
.tag.g{background:#1a3a2a;color:#00e676}
.tag.p{background:#3a1a2a;color:#ff6b9d}
#foot{padding:8px 12px;border-top:1px solid #2a2a3a;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#555}
#foot button{background:#1a1a25;border:1px solid #2a2a3a;color:#888;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#player-wrap{flex:1;background:#000;position:relative;overflow:hidden}
#video{width:100%;height:100%;background:#000;outline:none;object-fit:contain}
#info{padding:10px 16px;background:#12121a;border-top:1px solid #2a2a3a;display:flex;align-items:center;gap:10px;font-size:13px}
#info span{color:#888}
#info #chname{color:#fff;flex:1;font-weight:600}
#err{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;background:#1a0a0a;color:#ff5252;padding:8px 16px;border-radius:6px;font-size:12px;display:none;max-width:70%;text-align:center}
@media(max-width:768px){#app{flex-direction:column}#side{width:100%;max-height:35vh}}
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <h1>StreamHub</h1>
    <input id="search" placeholder="Buscar canal..." oninput="render()">
    <div id="list">Cargando...</div>
    <div id="foot">
      <span id="cnt">0</span>
      <button onclick="location.reload()">↻</button>
    </div>
  </div>
  <div id="main">
    <div id="player-wrap">
      <video id="video" controls autoplay playsinline></video>
      <div id="err"></div>
    </div>
    <div id="info">
      <span id="chname">Seleccioná un canal</span>
      <span id="st">Listo</span>
    </div>
  </div>
</div>

<script>
let channels = [];
let currentPlayer = null;
let activeUrl = null;

async function load() {
  try {
    let r = await fetch('channels/channels.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    channels = await r.json();
    document.getElementById('cnt').textContent = channels.length + ' canales';
    document.getElementById('list').onclick = e => {
      let el = e.target.closest('.ch');
      if (el && el.dataset.url) play(el.dataset.url);
    };
    render();
  } catch(e) {
    document.getElementById('list').innerHTML = 'Error: ' + e.message;
  }
  
  // Init shaka
  shaka.polyfill.installAll();
}

function render() {
  let q = document.getElementById('search').value.toLowerCase();
  let list = document.getElementById('list');
  let f = q ? channels.filter(c => c.name.toLowerCase().includes(q)) : channels;
  if (!f.length) { list.innerHTML = 'Sin resultados'; return; }
  
  list.innerHTML = f.map(c => {
    let t = c.type === 'mpd' ? 'MPD' : 'HLS';
    let cls = c.type === 'mpd' ? 'p' : 'g';
    return `<div class="ch ${activeUrl === c.url ? 'on' : ''}" data-url="${c.url}">
      <span>${c.name}</span>
      <span class="tag ${cls}">${t}</span>
    </div>`;
  }).join('');
}

function showErr(msg) {
  let e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
  setTimeout(() => { e.style.display = 'none'; }, 8000);
}

function destroyPlayer() {
  if (currentPlayer) {
    try { currentPlayer.destroy(); } catch(e) {}
    currentPlayer = null;
  }
  let v = document.getElementById('video');
  v.pause(); v.src = ''; v.load();
}

function play(url) {
  let ch = channels.find(c => c.url === url);
  if (!ch) return;
  
  activeUrl = url;
  render();
  destroyPlayer();
  
  document.getElementById('chname').textContent = '▶ ' + ch.name;
  document.getElementById('st').textContent = 'Cargando...';
  document.getElementById('err').style.display = 'none';
  
  if (ch.type === 'mpd') {
    playMPD(ch);
  } else {
    playHLS(ch.url);
  }
  
  setTimeout(() => {
    if (document.getElementById('st').textContent === 'Cargando...') {
      document.getElementById('st').textContent = '❌ Timeout';
      showErr('El stream no responde. Probá con otro canal.');
    }
  }, 15000);
}

function playHLS(url) {
  let video = document.getElementById('video');
  
  if (Hls && Hls.isSupported()) {
    let h = new Hls({ enableWorker: false });
    currentPlayer = h;
    h.loadSource(url);
    h.attachMedia(video);
    h.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(e => {
        // Autoplay might be blocked, that's OK
        if (e.name !== 'AbortError') showErr('Click en el video para reproducir');
      });
      document.getElementById('st').textContent = '▶ OK';
    });
    h.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        document.getElementById('st').textContent = '❌ Error';
        showErr('Error HLS: ' + (data.response?.code || 'fallo'));
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play().then(() => { document.getElementById('st').textContent = '▶ OK'; })
      .catch(() => { document.getElementById('st').textContent = '▶ OK'; });
  } else {
    showErr('HLS no soportado en este navegador');
    document.getElementById('st').textContent = '❌ Error';
  }
}

async function playMPD(ch) {
  let video = document.getElementById('video');
  
  if (!shaka.Player.isBrowserSupported()) {
    showErr('DASH/MPD no soportado en este navegador');
    document.getElementById('st').textContent = '❌ Error';
    return;
  }
  
  try {
    let player = new shaka.Player();
    currentPlayer = player;
    await player.attach(video);
    
    let config = { manifest: { dash: { ignoreMinBufferTime: true } } };
    if (ch.keyId && ch.key) {
      config.drm = { clearKeys: {} };
      config.drm.clearKeys[ch.keyId] = ch.key;
    }
    player.configure(config);
    
    await player.load(ch.url);
    video.play().catch(() => {});
    document.getElementById('st').textContent = '▶ OK';
    
  } catch(e) {
    document.getElementById('st').textContent = '❌ Error';
    showErr('MPD: ' + (e.message || e.code || 'error'));
  }
}

load();
</script>
</body>
</html>
