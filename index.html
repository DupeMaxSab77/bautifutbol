<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub</title>
<script src="https://cdn.jsdelivr.net/npm/bitmovin-player@8/bitmovinplayer.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#0a0a0f; color:#e0e0e0; }
#app { display:flex; height:100vh; }
#sidebar { width:320px; background:#12121a; display:flex; flex-direction:column; border-right:1px solid #2a2a3a; }
.sidebar-header { padding:16px; border-bottom:1px solid #2a2a3a; }
.sidebar-header h1 { font-size:20px; color:#00e676; margin-bottom:12px; }
#search { width:100%; padding:10px; border-radius:8px; border:1px solid #2a2a3a; background:#1a1a25; color:#fff; font-size:14px; outline:none; }
#search:focus { border-color:#00e676; }
#channel-list { flex:1; overflow-y:auto; padding:8px; }
.ch-item { padding:10px; border-radius:8px; cursor:pointer; margin-bottom:2px; transition:.15s; display:flex; justify-content:space-between; }
.ch-item:hover { background:#1e1e2e; }
.ch-item.active { background:#00e67622; border-left:3px solid #00e676; }
.ch-type { font-size:10px; padding:2px 6px; border-radius:4px; }
.ch-type.m3u8 { background:#1a3a2a; color:#00e676; }
.ch-type.mpd { background:#3a1a2a; color:#ff6b9d; }
#main { flex:1; display:flex; flex-direction:column; min-height:0; }
#player-container { flex:1; background:#000; position:relative; min-height:0; }
#player { width:100%; height:100%; position:absolute; top:0; left:0; }
#channel-info { padding:12px 20px; background:#12121a; border-top:1px solid #2a2a3a; display:flex; align-items:center; gap:12px; }
#channel-info h2 { font-size:16px; flex:1; }
#current-type { font-size:11px; padding:3px 8px; border-radius:4px; background:#2a2a3a; }
#status { font-size:12px; color:#888; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-thumb { background:#2a2a3a; border-radius:3px; }
.sidebar-footer { padding:12px 16px; border-top:1px solid #2a2a3a; font-size:12px; color:#666; display:flex; justify-content:space-between; }
.sidebar-footer button { background:#1a1a25; border:1px solid #2a2a3a; color:#888; width:32px; height:32px; border-radius:8px; cursor:pointer; }
@media(max-width:768px) { #app { flex-direction:column; } #sidebar { width:100%; max-height:40vh; } }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>StreamHub</h1>
      <input type="text" id="search" placeholder="Buscar canal...">
    </div>
    <div id="channel-list"><div style="padding:20px;text-align:center;color:#555;">Cargando canales...</div></div>
    <div class="sidebar-footer">
      <span id="channel-count">0</span>
      <button onclick="location.reload()">↻</button>
    </div>
  </aside>
  <main id="main">
    <div id="player-container"><div id="player"></div></div>
    <div id="channel-info">
      <h2 id="current-channel">Seleccioná un canal</h2>
      <span id="current-type"></span>
      <span id="status">Bitmovin listo</span>
    </div>
  </main>
</div>

<script>
const channels = [];
let player = null;
let currentUrl = null;

const KEY = '2f903b3f-3e3e-4c77-b3ef-4afed705ae75';

// Inicializar Bitmovin sin stream
function initPlayer() {
  try {
    if (typeof bitmovin === 'undefined') {
      document.getElementById('status').textContent = '❌ Bitmovin no cargó';
      return false;
    }
    player = new bitmovin.player.Player(document.getElementById('player'), {
      key: KEY,
      ui: false
    });
    document.getElementById('status').textContent = '✅ Bitmovin listo';
    return true;
  } catch(e) {
    document.getElementById('status').textContent = '❌ ' + e.message;
    return false;
  }
}

// Cargar canales
async function loadChannels() {
  try {
    const resp = await fetch('channels/channels.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    channels.push(...data);
    render();
    document.getElementById('channel-count').textContent = channels.length + ' canales';
  } catch(e) {
    document.getElementById('channel-list').innerHTML = 
      '<div style="padding:20px;text-align:center;color:#f55;">Error: ' + e.message + '</div>';
  }
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('channel-list');
  const filtered = q ? channels.filter(c => c.name.toLowerCase().includes(q)) : channels;
  
  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#555;">Sin resultados</div>';
    return;
  }
  
  list.innerHTML = filtered.map(ch => 
    `<div class="ch-item ${currentUrl === ch.url ? 'active' : ''}" data-url="${ch.url}">
      <span>${ch.name}</span>
      <span class="ch-type ${ch.type}">${ch.type}</span>
    </div>`
  ).join('');
  
  // Click handler via delegation
  list.onclick = function(e) {
    const item = e.target.closest('.ch-item');
    if (item) playChannel(item.dataset.url);
  };
}

document.getElementById('search').addEventListener('input', render);

async function playChannel(url) {
  const ch = channels.find(c => c.url === url);
  if (!ch) return;
  
  currentUrl = ch.url;
  render();
  document.getElementById('current-channel').textContent = '▶ ' + ch.name;
  document.getElementById('current-type').textContent = ch.type;
  document.getElementById('status').textContent = 'Cargando...';
  
  try {
    let source = { title: ch.name };
    
    if (ch.type === 'mpd') {
      source.dash = ch.url;
      if (ch.keyId && ch.key) {
        source.drm = { clearkey: {} };
        source.drm.clearkey[ch.keyId] = ch.key;
      }
    } else {
      source.hls = ch.url;
    }
    
    await player.load(source);
    document.getElementById('status').textContent = '▶ OK';
    
  } catch(e) {
    document.getElementById('status').textContent = '❌ ' + (e.message || 'error');
    document.getElementById('current-channel').textContent = 'Error: ' + ch.name;
  }
}

initPlayer();
loadChannels();
</script>
</body>
</html>
