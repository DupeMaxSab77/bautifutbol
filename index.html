<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub - Bitmovin Player</title>
<script src="https://cdn.jsdelivr.net/npm/bitmovin-player@8/bitmovinplayer.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#0a0a0f; color:#e0e0e0; }
#app { display:flex; height:100vh; }
#sidebar { width:320px; background:#12121a; display:flex; flex-direction:column; border-right:1px solid #2a2a3a; }
.sidebar-header { padding:16px; border-bottom:1px solid #2a2a3a; }
.sidebar-header h1 { font-size:20px; color:#00e676; margin-bottom:12px; }
#search { width:100%; padding:10px; border-radius:8px; border:1px solid #2a2a3a; background:#1a1a25; color:#fff; font-size:14px; outline:none; }
#search:focus { border-color:#00e676; }
#channel-list { flex:1; overflow-y:auto; padding:8px; }
.ch-item { padding:10px; border-radius:8px; cursor:pointer; margin-bottom:2px; transition:.15s; display:flex; justify-content:space-between; }
.ch-item:hover { background:#1e1e2e; }
.ch-item.active { background:#00e67622; border-left:3px solid #00e676; }
.ch-type { font-size:10px; padding:2px 6px; border-radius:4px; background:#2a2a3a; }
.ch-type.m3u8 { background:#1a3a2a; color:#00e676; }
.ch-type.mpd { background:#3a1a2a; color:#ff6b9d; }
#main { flex:1; display:flex; flex-direction:column; }
#player-container { flex:1; background:#000; }
#player { width:100%; height:100%; }
#channel-info { padding:12px 20px; background:#12121a; border-top:1px solid #2a2a3a; display:flex; align-items:center; gap:12px; }
#channel-info h2 { font-size:16px; }
#current-type { font-size:11px; padding:3px 8px; border-radius:4px; background:#2a2a3a; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-thumb { background:#2a2a3a; border-radius:3px; }
@media(max-width:768px) { #app { flex-direction:column; } #sidebar { width:100%; max-height:40vh; } }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>StreamHub</h1>
      <input type="text" id="search" placeholder="Buscar canal...">
    </div>
    <div id="channel-list"></div>
    <div class="sidebar-footer" style="padding:12px 16px;border-top:1px solid #2a2a3a;font-size:12px;color:#666;display:flex;justify-content:space-between;">
      <span id="channel-count">0 canales</span>
      <button id="refresh-btn" onclick="loadChannels()" style="background:#1a1a25;border:1px solid #2a2a3a;color:#888;width:32px;height:32px;border-radius:8px;cursor:pointer;">↻</button>
    </div>
  </aside>
  <main id="main">
    <div id="player-container"><div id="player"></div></div>
    <div id="channel-info">
      <h2 id="current-channel">Sin canal seleccionado</h2>
      <span id="current-type"></span>
    </div>
  </main>
</div>

<script>
const channels = [];
let player = null;
let currentChannel = null;

const BITMOVIN_KEY = '2f903b3f-3e3e-4c77-b3ef-4afed705ae75';

async function loadChannels() {
  try {
    const resp = await fetch('channels/channels.json');
    const data = await resp.json();
    channels.length = 0;
    channels.push(...data);
    renderChannels();
    document.getElementById('channel-count').textContent = channels.length + ' canales';
  } catch(e) { console.error(e); }
}

function renderChannels(filter = '') {
  const q = filter.toLowerCase();
  const list = document.getElementById('channel-list');
  const filtered = q ? channels.filter(c => c.name.toLowerCase().includes(q)) : channels;
  list.innerHTML = filtered.map(ch => 
    `<div class="ch-item ${currentChannel === ch.url ? 'active' : ''}" onclick="playChannel('${encodeURIComponent(ch.url)}')">
      <span>${ch.name}</span>
      <span class="ch-type ${ch.type}">${ch.type}</span>
    </div>`
  ).join('');
}

document.getElementById('search').addEventListener('input', e => renderChannels(e.target.value));

async function playChannel(encodedUrl) {
  const url = decodeURIComponent(encodedUrl);
  const ch = channels.find(c => c.url === url);
  if (!ch) return;
  
  currentChannel = ch.url;
  renderChannels(document.getElementById('search').value);
  document.getElementById('current-channel').textContent = ch.name;
  document.getElementById('current-type').textContent = ch.type;
  
  if (!player) {
    player = new bitmovin.player.Player(document.getElementById('player'), {
      key: BITMOVIN_KEY,
      ui: false
    });
  }
  
  try {
    let source = {};
    
    if (ch.type === 'mpd') {
      source = {
        title: ch.name,
        dash: ch.url
      };
      if (ch.keyId && ch.key) {
        source.drm = { clearkey: {} };
        source.drm.clearkey[ch.keyId] = ch.key;
      }
    } else {
      source = {
        title: ch.name,
        hls: ch.url
      };
    }
    
    await player.load(source);
    document.getElementById('channel-info').style.borderTop = '3px solid #00e676';
  } catch(e) {
    document.getElementById('current-channel').textContent = 'Error: ' + (e.message || 'reproduccion');
    document.getElementById('channel-info').style.borderTop = '3px solid #ff5252';
  }
}

loadChannels();
</script>
</body>
</html>
