<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub - Player DRM + HLS</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>StreamHub</h1>
      <input type="text" id="search" placeholder="Buscar canal...">
    </div>
    <div id="channel-list"></div>
    <div class="sidebar-footer">
      <span id="channel-count">0 canales</span>
      <button id="refresh-btn" onclick="refreshPlaylist()">↻</button>
    </div>
  </aside>

  <main id="main">
    <div id="player-container">
      <video id="video-player" controls autoplay playsinline></video>
      <div id="player-overlay">
        <div id="loading-msg">Seleccioná un canal</div>
        <div id="error-msg" class="hidden"></div>
      </div>
    </div>
    <div id="channel-info">
      <h2 id="current-channel">Sin canal seleccionado</h2>
      <span id="current-type"></span>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
