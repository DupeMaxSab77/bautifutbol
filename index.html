<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0f;color:#e0e0e0}
#app{display:flex;height:100vh}
#sidebar{width:300px;background:#12121a;display:flex;flex-direction:column;border-right:1px solid #2a2a3a;flex-shrink:0}
#sidebar h1{color:#00e676;padding:16px;font-size:18px;border-bottom:1px solid #2a2a3a}
#search{margin:8px;padding:8px;border-radius:6px;border:1px solid #2a2a3a;background:#1a1a25;color:#fff;font-size:13px}
#channel-list{flex:1;overflow-y:auto;padding:4px 8px;font-size:13px}
.ch-item{padding:8px;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;margin-bottom:1px}
.ch-item:hover{background:#1e1e2e}
.ch-item.active{background:#00e67622;border-left:2px solid #00e676}
.badge{font-size:9px;padding:2px 5px;border-radius:3px;background:#2a2a3a}
.badge.green{background:#1a3a2a;color:#00e676}
.badge.orange{background:#3a2a1a;color:#ffaa00}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#player-wrap{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative}
#video{width:100%;height:100%;background:#000;outline:none}
#info{padding:12px 16px;background:#12121a;border-top:1px solid #2a2a3a;display:flex;align-items:center;gap:10px;font-size:13px}
#info span{color:#888}
#info #name{color:#fff;flex:1}
#err{position:absolute;background:#1a0a0a;color:#ff5252;padding:10px 20px;border-radius:8px;font-size:13px;display:none;max-width:80%;text-align:center}
#count{font-size:11px;color:#555}
#foot{padding:8px 12px;border-top:1px solid #2a2a3a;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#555}
#foot button{background:#1a1a25;border:1px solid #2a2a3a;color:#888;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px}
@media(max-width:768px){#app{flex-direction:column}#sidebar{width:100%;max-height:35vh}}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>StreamHub</h1>
    <input id="search" placeholder="Buscar..." oninput="render()">
    <div id="channel-list">Cargando...</div>
    <div id="foot">
      <span id="count">0</span>
      <button onclick="location.reload()">↻</button>
    </div>
  </div>
  <div id="main">
    <div id="player-wrap">
      <video id="video" controls autoplay playsinline></video>
      <div id="err"></div>
    </div>
    <div id="info">
      <span id="name">Seleccioná un canal</span>
      <span id="status">Listo</span>
    </div>
  </div>
</div>

<script>
let channels = [];
let hls = null;
let activeUrl = null;

async function load() {
  try {
    let r = await fetch('channels/channels.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    channels = await r.json();
    document.getElementById('count').textContent = channels.length + ' canales';
    document.getElementById('channel-list').onclick = e => {
      let el = e.target.closest('.ch-item');
      if (el && el.dataset.url) play(el.dataset.url);
    };
    render();
  } catch(e) {
    document.getElementById('channel-list').innerHTML = 'Error: ' + e.message;
  }
}

function render() {
  let q = document.getElementById('search').value.toLowerCase();
  let list = document.getElementById('channel-list');
  let f = q ? channels.filter(c => c.name.toLowerCase().includes(q)) : channels;
  if (!f.length) { list.innerHTML = 'Sin resultados'; return; }
  
  list.innerHTML = f.map(c => {
    let isHttps = c.url.startsWith('https://');
    let badge = c.type === 'mpd' ? 'MPD' : (isHttps ? 'HLS' : 'HTTP');
    let cls = isHttps ? 'green' : 'orange';
    return `<div class="ch-item ${activeUrl === c.url ? 'active' : ''}" data-url="${c.url}">
      <span>${c.name}</span>
      <span class="badge ${cls}">${badge}</span>
    </div>`;
  }).join('');
}

function play(url) {
  let ch = channels.find(c => c.url === url);
  if (!ch) return;
  
  activeUrl = url;
  render();
  
  document.getElementById('name').textContent = '▶ ' + ch.name;
  document.getElementById('status').textContent = 'Cargando...';
  document.getElementById('err').style.display = 'none';
  
  // Destroy previous HLS
  if (hls) { hls.destroy(); hls = null; }
  let video = document.getElementById('video');
  video.pause();
  video.src = '';
  video.load();
  
  // Check mixed content
  if (!url.startsWith('https://') && location.protocol === 'https:') {
    document.getElementById('name').textContent = ch.name;
    document.getElementById('status').textContent = '❌ Solo HTTP';
    document.getElementById('err').textContent = 'Este canal solo funciona en HTTP. No disponible desde HTTPS.';
    document.getElementById('err').style.display = 'block';
    return;
  }
  
  // Play with hls.js or native
  if (Hls && Hls.isSupported()) {
    hls = new Hls({ enableWorker: false });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
      document.getElementById('status').textContent = '▶ OK';
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        document.getElementById('status').textContent = '❌ Error';
        document.getElementById('err').textContent = 'Error HLS: ' + (data.response?.code || 'fallo');
        document.getElementById('err').style.display = 'block';
      }
    });
    setTimeout(() => {
      if (document.getElementById('status').textContent === 'Cargando...') {
        document.getElementById('status').textContent = '❌ Timeout';
        document.getElementById('err').textContent = 'El stream no responde. Probá con otro canal.';
        document.getElementById('err').style.display = 'block';
      }
    }, 15000);
  } else {
    video.src = url;
    video.play().then(() => {
      document.getElementById('status').textContent = '▶ OK';
    }).catch(e => {
      document.getElementById('status').textContent = '❌ Error';
      document.getElementById('err').textContent = 'Error: ' + e.message;
      document.getElementById('err').style.display = 'block';
    });
  }
}

load();
</script>
</body>
</html>
