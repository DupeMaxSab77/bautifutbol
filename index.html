<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;font-family:Arial,sans-serif;color:#e0e0e0;display:flex;height:100vh}
#s{width:270px;background:#12121a;display:flex;flex-direction:column;border-right:1px solid #2a2a3a}
#s h1{color:#00e676;padding:12px;font-size:15px;border-bottom:1px solid #2a2a3a}
#l{flex:1;overflow-y:auto;padding:4px;font-size:12px}
.c{padding:6px 8px;border-radius:4px;cursor:pointer;margin-bottom:1px;display:flex;justify-content:space-between}
.c:hover{background:#1e1e2e}
.c.on{background:#00e67622;border-left:2px solid #00e676}
.t{font-size:8px;padding:1px 4px;border-radius:2px}
.t1{background:#1a3a2a;color:#00e676}
.t2{background:#3a1a2a;color:#ff6b9d}
#m{flex:1;display:flex;flex-direction:column}
#w{flex:1;background:#000;position:relative}
#v{width:100%;height:100%;background:#000;object-fit:contain}
#i{padding:6px 12px;background:#12121a;border-top:1px solid #2a2a3a;display:flex;justify-content:space-between;font-size:11px}
#r{color:#888}#n{color:#fff}
@media(max-width:768px){#s{width:100%;max-height:30vh}body{flex-direction:column}}
</style>
</head>
<body>
<div id="s">
  <h1>StreamHub</h1>
  <div id="l">Cargando...</div>
  <div style="padding:4px 8px;font-size:10px;color:#555;border-top:1px solid #2a2a3a" id="c"></div>
</div>
<div id="m">
  <div id="w"><video id="v" controls autoplay playsinline></video></div>
  <div id="i"><span id="n">Elegí un canal</span><span id="r">shaka + hls</span></div>
</div>

<script>
let cc=[],hls=null,au=null,shp=null,apiBase='/api';

async function load(){
  try{
    let r=await fetch('channels/channels.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    cc=await r.json();
    document.getElementById('c').textContent=cc.length+' canales';
    document.getElementById('l').onclick=e=>{
      let el=e.target.closest('.c');
      if(el)play(el.dataset.idx);
    };
    render();
    shaka.polyfill.installAll();
  }catch(e){document.getElementById('l').innerHTML='Error: '+e.message}
}

function render(){
  let q=(document.getElementById('l').querySelector('input')||{}).value||'';
  let f=q?cc.filter(c=>c.name.toLowerCase().includes(q)):cc;
  document.getElementById('l').innerHTML=(f.length?f.map((c,i)=>{
    let idx=cc.indexOf(c);
    return `<div class="c ${au===idx?'on':''}" data-idx="${idx}"><span>${c.name}</span><span class="t ${c.type==='mpd'?'t2':'t1'}">${c.type==='mpd'?'D':'H'}</span></div>`;
  }).join(''):'Sin resultados')+
  '<input placeholder="Buscar..." oninput="render()" style="margin-top:6px;width:100%;padding:5px;border-radius:4px;border:1px solid #2a2a3a;background:#1a1a25;color:#fff;font-size:11px;outline:none">';
}

async function play(idx){
  au=parseInt(idx);
  render();
  document.getElementById('n').textContent='▶ '+cc[au].name;
  document.getElementById('r').textContent='Conectando...';
  
  if(hls){hls.destroy();hls=null}
  if(shp){shp.destroy();shp=null}
  let v=document.getElementById('v');
  v.pause();v.src='';v.load();
  
  try{
    let ch=cc[au];
    let endpoint;
    if(ch.type==='mpd') endpoint=`${apiBase}/mpd?b64=${ch.b64}`;
    else endpoint=`${apiBase}/hls?name=${ch.hls_name}`;
    
    let r=await fetch(endpoint);
    let data=await r.json();
    
    if(data.error){document.getElementById('r').textContent='❌ '+data.error;return;}
    
    if(data.type==='mpd') await loadMPD(data,v);
    else loadHLS(data,v);
  }catch(e){document.getElementById('r').textContent='❌ Error';}
}

function loadHLS(data,v){
  if(Hls&&Hls.isSupported()){
    hls=new Hls({enableWorker:false});
    hls.loadSource(data.url);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      v.play().then(()=>document.getElementById('r').textContent='▶ OK').catch(()=>document.getElementById('r').textContent='⏸ Click');
    });
    hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal)document.getElementById('r').textContent='❌ Error'});
  }else{v.src=data.url;v.play().then(()=>document.getElementById('r').textContent='▶ OK');}
}

async function loadMPD(data,v){
  if(!shaka.Player.isBrowserSupported()){document.getElementById('r').textContent='❌ No soportado';return;}
  try{
    let p=new shaka.Player();shp=p;
    await p.attach(v);
    let cfg={manifest:{dash:{ignoreMinBufferTime:true}}};
    if(data.keyId&&data.key){cfg.drm={clearKeys:{[data.keyId]:data.key}};}
    p.configure(cfg);
    await p.load(data.url);
    v.play().then(()=>document.getElementById('r').textContent='▶ OK').catch(()=>document.getElementById('r').textContent='⏸ Click');
  }catch(e){document.getElementById('r').textContent='❌ Error';}
}

load();
</script>
</body>
</html>
